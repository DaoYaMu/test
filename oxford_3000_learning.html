// Auto-generate remaining days
themes.forEach((theme, index) => {
  const key = theme[1];
  if (!vocabularyData[key]) {
    const dayNum = index + 3; // Start from day 3
    const category = Object.keys(wordBanks)[index % Object.keys(wordBanks).length];
    const words = wordBanks[category].map((w, i) => ({
      word: w,
      pron: "/" + w + "/",
      meaning: "词义" + (i+1),
      example: "Example sentence with " + w + "."
    }));
    
    vocabularyData[key] = {
      day: dayNum,
      theme: theme[0],
      level: theme[2],
      words: words.slice(0, 30),
      dialogue: `A: Let's talk about ${theme[0]}.\nB: Great idea! What do you want to know?\nA: I'd like to learn the basic vocabulary.\nB: Sure! Let's start with some common words.\nA: How do we use them in sentences?\nB: I'll show you some examples.\nA: This is really helpful!\nB: Practice makes perfect!\nA: Thank you for your guidance.\nB: You're welcome! Keep learning!`,
      tips: ["每天学习30个新单词", "制作单词卡片", "在对话中使用新词", "定期复习旧单词"],
      quiz: [
        {question: "今日主题是什么？", options: ["问候", theme[0], "数字", "颜色"], correct: 1},
        {question: "学习级别是？", options: ["A1", "A2", theme[2], "C1"], correct: 2}
      ]
    };
  }
});

console.log("Loaded " + Object.keys(vocabularyData).length + " days of vocabulary data");

// Application State
let currentDay = 1;
let completedDays = new Set();
let currentFilter = 'all';

// Initialize the application
function init() {
    renderDaySelector();
    loadProgress();
    showDay(1);
    updateStats();
}

// Render day selector buttons
function renderDaySelector(filter = 'all') {
    const selector = document.getElementById('daySelector');
    selector.innerHTML = '';
    
    Object.keys(vocabularyData).forEach(key => {
        const data = vocabularyData[key];
        const dayNum = data.day;
        
        // Apply filter
        if (filter !== 'all') {
            const [start, end] = filter.split('-').map(Number);
            if (dayNum < start || dayNum > end) return;
        }
        
        const btn = document.createElement('button');
        btn.className = 'day-btn' + (completedDays.has(dayNum) ? ' completed' : '');
        btn.textContent = '第' + dayNum + '天';
        btn.onclick = () => showDay(dayNum);
        selector.appendChild(btn);
    });
}

// Show specific day content
function showDay(dayNum) {
    currentDay = dayNum;
    const contentSection = document.getElementById('contentSection');
    
    // Find the data for this day
    let dayData = null;
    let dayKey = null;
    for (const key in vocabularyData) {
        if (vocabularyData[key].day === dayNum) {
            dayData = vocabularyData[key];
            dayKey = key;
            break;
        }
    }
    
    if (!dayData) {
        contentSection.innerHTML = '<div class="section"><h3>内容加载中...</h3></div>';
        return;
    }
    
    // Generate word cards HTML
    let wordsHTML = '';
    dayData.words.forEach((word, index) => {
        wordsHTML += `
            <div class="word-card">
                <div class="word-main">${word.word}</div>
                <div class="word-pronunciation">${word.pron}</div>
                <div class="word-meaning">${word.meaning}</div>
                <div class="word-example">${word.example}</div>
            </div>
        `;
    });
    
    // Generate dialogue HTML with highlighted words
    let dialogueHTML = dayData.dialogue.split('\n').map(line => {
        const speaker = line.startsWith('A:') ? 'speaker-a' : 'speaker-b';
        let content = line.replace(/^[AB]:/, '');
        
        // Highlight vocabulary words
        dayData.words.slice(0, 10).forEach(word => {
            const regex = new RegExp(`\\b(${word.word})\\b`, 'gi');
            content = content.replace(regex, `<span class="highlight-word" onclick="showWordModal('${word.word}', '${word.pron}', '${word.meaning}', '${word.example}')">$1</span>`);
        });
        
        return `<div class="dialogue-line ${speaker}">${content}</div>`;
    }).join('');
    
    // Generate quiz HTML
    let quizHTML = '';
    dayData.quiz.forEach((q, qi) => {
        quizHTML += `
            <div class="quiz-container">
                <div class="quiz-question">${qi + 1}. ${q.question}</div>
                <div class="quiz-options">
                    ${q.options.map((opt, oi) => 
                        `<div class="quiz-option" onclick="checkAnswer(this, ${oi}, ${q.correct}, ${qi})">${opt}</div>`
                    ).join('')}
                </div>
            </div>
        `;
    });
    
    // Render complete day content
    contentSection.innerHTML = `
        <div class="day-content active">
            <div class="day-header">
                <div class="day-title">第${dayNum}天 - ${dayData.theme}</div>
                <div class="day-theme">难度级别：${dayData.level}</div>
            </div>
            
            <div class="section">
                <h3>📖 今日词汇 (30个)</h3>
                <div class="vocabulary-grid">
                    ${wordsHTML}
                </div>
            </div>
            
            <div class="section">
                <h3>💬 日常对话练习</h3>
                <div class="dialogue-box">
                    ${dialogueHTML}
                </div>
            </div>
            
            <div class="section tips-section">
                <h3>💡 学习建议</h3>
                <ul style="margin-left: 20px; line-height: 2;">
                    ${dayData.tips.map(tip => `<li>${tip}</li>`).join('')}
                </ul>
            </div>
            
            <div class="section practice-section">
                <h3>✏️ 小测验</h3>
                ${quizHTML}
            </div>
            
            <div class="achievement">
                <h3>🎉 完成今日学习后，记得标记为完成！</h3>
                <p>持之以恒，100天后你将掌握牛津3000词！</p>
            </div>
        </div>
    `;
    
    // Update active button
    document.querySelectorAll('.day-btn').forEach(btn => {
        btn.classList.remove('active');
        if (btn.textContent.includes('第' + dayNum + '天')) {
            btn.classList.add('active');
        }
    });
    
    // Scroll to top
    window.scrollTo({top: 0, behavior: 'smooth'});
}

// Check quiz answer
function checkAnswer(element, selected, correct, questionIndex) {
    const parent = element.parentElement;
    const options = parent.querySelectorAll('.quiz-option');
    
    options.forEach((opt, idx) => {
        opt.style.pointerEvents = 'none';
        if (idx === correct) {
            opt.classList.add('correct');
        } else if (idx === selected && idx !== correct) {
            opt.classList.add('wrong');
        }
    });
}

// Show word modal
function showWordModal(word, pron, meaning, example) {
    const modal = document.getElementById('wordModal');
    const content = document.getElementById('modalContent');
    
    content.innerHTML = `
        <h2 style="color: #3498db; margin-bottom: 20px;">${word}</h2>
        <p style="font-size: 1.2em; color: #7f8c8d;">${pron}</p>
        <p style="font-size: 1.5em; margin: 20px 0;">${meaning}</p>
        <div style="background: #e8f4f8; padding: 20px; border-radius: 10px; margin-top: 20px;">
            <strong>例句:</strong><br>
            <em style="font-size: 1.1em;">${example}</em>
        </div>
    `;
    
    modal.style.display = 'flex';
}

// Close modal
function closeModal() {
    document.getElementById('wordModal').style.display = 'none';
}

// Navigation functions
function prevDay() {
    if (currentDay > 1) {
        showDay(currentDay - 1);
    }
}

function nextDay() {
    if (currentDay < 100) {
        showDay(currentDay + 1);
    }
}

function toggleMarkComplete() {
    if (completedDays.has(currentDay)) {
        completedDays.delete(currentDay);
    } else {
        completedDays.add(currentDay);
    }
    saveProgress();
    renderDaySelector(currentFilter);
    updateStats();
}

function showRandomDay() {
    const randomDay = Math.floor(Math.random() * 100) + 1;
    showDay(randomDay);
}

// Filter functionality
document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', function() {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        currentFilter = this.dataset.filter;
        renderDaySelector(currentFilter);
    });
});

// Search functionality
document.getElementById('searchBox').addEventListener('input', function(e) {
    const searchTerm = e.target.value.toLowerCase();
    const selector = document.getElementById('daySelector');
    
    if (searchTerm === '') {
        renderDaySelector(currentFilter);
        return;
    }
    
    selector.innerHTML = '';
    Object.keys(vocabularyData).forEach(key => {
        const data = vocabularyData[key];
        const match = data.theme.includes(searchTerm) || 
                     data.words.some(w => w.word.toLowerCase().includes(searchTerm));
        
        if (match) {
            const btn = document.createElement('button');
            btn.className = 'day-btn' + (completedDays.has(data.day) ? ' completed' : '');
            btn.textContent = '第' + data.day + '天';
            btn.onclick = () => showDay(data.day);
            selector.appendChild(btn);
        }
    });
});

// Local storage for progress
function saveProgress() {
    localStorage.setItem('oxford3000_completedDays', JSON.stringify([...completedDays]));
    localStorage.setItem('oxford3000_currentDay', currentDay);
}

function loadProgress() {
    const saved = localStorage.getItem('oxford3000_completedDays');
    if (saved) {
        completedDays = new Set(JSON.parse(saved));
    }
    const savedDay = localStorage.getItem('oxford3000_currentDay');
    if (savedDay) {
        currentDay = parseInt(savedDay);
    }
}

function updateStats() {
    document.getElementById('daysCompleted').textContent = completedDays.size;
    document.getElementById('wordsLearned').textContent = completedDays.size * 30;
    document.getElementById('progressFill').textContent = (completedDays.size) + '%';
    document.getElementById('progressFill').style.width = (completedDays.size) + '%';
    
    // Calculate streak (simplified)
    document.getElementById('currentStreak').textContent = completedDays.size > 0 ? 
        Math.min(completedDays.size, 7) : 0;
}

// Close modal on outside click
window.onclick = function(event) {
    const modal = document.getElementById('wordModal');
    if (event.target === modal) {
        closeModal();
    }
};

// Keyboard navigation
document.addEventListener('keydown', function(e) {
    if (e.key === 'ArrowLeft') prevDay();
    if (e.key === 'ArrowRight') nextDay();
    if (e.key === 'Escape') closeModal();
});

// Initialize on load
window.onload = init;
    </script>
